  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: Disabled
    entrypoint: bash
    args:
      - -c
      - |
        echo "ERROR: cloudbuild.yaml is orphaned and must not be invoked."
        echo "The real CI pipeline uses inline trigger steps, not this file."
        echo "See the header comment for details."
        exit 1
